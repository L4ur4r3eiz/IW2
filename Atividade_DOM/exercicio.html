<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Página</title>
    <link rel="stylesheet" href="exercicio.css">
</head>
<body>

    <h1>Minha Página</h1>

    <p id="texto">Texto original</p>

    <button onclick="mudarTexto()">Clique aqui</button>

    <script>
        function mudarTexto() {
            document.getElementById("texto").innerText = "Obrigado por clicar no botão";
        }
    </script>

</body>
</html>
